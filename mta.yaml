_schema-version: "3.1"
ID: btp-auditlog-mcp-server
version: 1.0.0

parameters:
  enable-parallel-deployments: true

modules:
  - name: btp-auditlog-mcp-server
    type: nodejs
    path: .
    parameters:
      memory: 512M
      disk-quota: 1G
      buildpack: nodejs_buildpack
      health-check-type: http
      health-check-http-endpoint: /health
      command: npm start
    build-parameters:
      builder: npm
      ignore:
        - .git/
        - .env
        - default-env.json
    requires:
      - name: btp-auditlog-mcp-server-destination
      - name: btp-auditlog-mcp-server-connectivity
      - name: btp-auditlog-mcp-server-xsuaa

resources:
  - name: btp-auditlog-mcp-server-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: btp-auditlog-mcp-server-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: btp-auditlog-mcp-server-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json